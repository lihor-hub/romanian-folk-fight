# Run `pre-commit install` once after cloning; hooks then run on every commit.
# Run all hooks manually with: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      # 1 MiB (default 500 KB): #198's DPR-3 visual baselines
      # (tests/visual/baselines/gold-journey/desktop-dpr3-*.png, up to
      # ~790 KB) are committed as-is -- recompressing them would break the
      # harness's byte-identical baseline comparison against fresh captures.
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust code
        entry: cargo fmt -- --check
        language: system
        files: \.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust code
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false

      # ── pre-push: full quality gate before code leaves the machine ─────────
      - id: cargo-test
        name: cargo test (pre-push)
        description: Run Rust unit tests
        entry: cargo test
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [pre-push]
