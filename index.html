<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romanian Folk Fight</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <script type="module">
        import init from './client.js';
        
        async function run() {
            try {
                await init();
            } catch (err) {
                console.error("Failed to run Bevy app:", err);
            }
        }
        run();
    </script>
</body>
</html>
