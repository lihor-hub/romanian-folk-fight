<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Romanian Folk Fight</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1214;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e8dcc8;
        font-family: Georgia, serif;
        font-size: 1.5rem;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">Se încarcă…</div>
    <canvas id="game-canvas"></canvas>
    <script type="module">
      // Trunk fires this once the wasm app has started; drop the loading text.
      addEventListener("TrunkApplicationStarted", () => {
        document.getElementById("loading")?.remove();
      });
    </script>
  </body>
</html>
