name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  fmt:
    name: Run cargo fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
    - name: Run cargo fmt
      run: cargo fmt --all -- --check

  build_and_test:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install system dependencies for Bevy and LLD
      run: |
        sudo rm -f /etc/apt/apt.conf.d/docker-clean
        sudo apt-get update
        sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev lld clang

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Run cargo clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Run cargo test
      run: cargo test

  wasm_build:
    name: Build WASM
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Run cargo clippy (wasm32)
      run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Build web bundle
      run: trunk build --release

  publish:
    name: Build & push image
    needs: [build_and_test, fmt, wasm_build]
    runs-on: [self-hosted]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to Kubernetes
    needs: [publish]
    runs-on: [self-hosted]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Deploy Script
        env:
          # GHCR_PULL_TOKEN must be a PAT with read:packages; GITHUB_TOKEN
          # expires with the job, but pods re-pull whenever they reschedule.
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          ./scripts/deploy-local-k8s.sh "${{ github.sha }}"
