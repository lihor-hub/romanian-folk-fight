name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Run cargo fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
    - name: Run cargo fmt
      run: cargo fmt --all -- --check

  build_and_test:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install system dependencies for Bevy and LLD
      run: |
        sudo rm -f /etc/apt/apt.conf.d/docker-clean
        sudo apt-get update
        sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev lld clang

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Run cargo clippy
      run: cargo clippy --all-targets -- -D warnings

    # #294: `src/review/mod.rs` (the review-feature browser-harness seam,
    # #187) is `#![cfg(feature = "review")]`-gated with no `cfg(test)`
    # escape hatch, so it and its 23 tests are invisible to the two steps
    # above -- mirrors the same review-feature clippy/test pair
    # `cargo xtask pre-push` runs locally (xtask/src/commands/pre_push.rs),
    # so the local gate and CI stay equivalent. Kept as its own step rather
    # than folded into the one above so a regression only visible without
    # the feature (the configuration every shipped build/the step above
    # actually uses) is never masked by only ever linting with it on.
    - name: Run cargo clippy (review feature)
      run: cargo clippy --all-targets --features review -- -D warnings

    - name: Run cargo test
      run: cargo test

    # #294: see the "review feature" clippy step above -- same reasoning,
    # this is the only CI step that actually compiles and runs
    # `src/review/mod.rs`'s 23 tests.
    - name: Run cargo test (review feature)
      run: cargo test --features review

  wasm_build:
    name: Build WASM
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Run cargo clippy (wasm32)
      run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Build web bundle
      run: trunk build --release
