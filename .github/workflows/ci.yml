name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies for Bevy
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Run cargo fmt
      run: cargo fmt --all -- --check

    - name: Run cargo clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Run cargo test
      run: cargo test
