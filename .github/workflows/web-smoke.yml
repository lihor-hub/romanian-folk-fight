name: Browser smoke

# Separate from `ci.yml` (native/wasm build+test) and `deploy.yml` (GitHub
# Pages publish): this workflow builds+serves the WASM game and drives a
# real, freshly-launched Chrome against it via `cargo xtask web-smoke
# --scenario <name>` (#144/#168/#187/#189/#191/#198/#199/#200/#214). It
# never touches #141's future asset workflow.
#
# `gold-journey` now walks the full #198 matrix in one invocation: both
# viewports (1280x800 desktop, 390x844 phone) at device pixel ratios 1, 2,
# and 3, all five gold-journey screens at each -- 30 checkpoints -- from the
# *same* single `trunk build --release --features review` this job already
# ran (the DPR/viewport dimension only changes the headless-Chrome
# emulation per checkpoint; the wasm bundle it drives is built once). This
# workflow deliberately does not invoke `cargo xtask web-smoke --all`: that
# command exists for a single local/CI process that wants every scenario
# back to back, but this workflow keeps every scenario as its own parallel
# job so the builds and browser sessions run concurrently instead of
# serially, which is the dominant factor in this workflow's wall-clock
# runtime.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      strict_visual:
        description: >-
          Fail a checkpoint whose screenshot differs from its accepted
          baseline (--strict-visual), instead of the default non-fatal
          report. Manual/opt-in only -- see xtask/README.md's "Visual-diff
          review gating" section.
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  cold-menu:
    name: cold-menu (desktop + phone)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    # ubuntu-latest ships a recent stable Chrome at google-chrome-stable;
    # headless_chrome's `default_executable()` finds it on PATH directly
    # (see `xtask/src/web_smoke/browser.rs`'s module docs for why no
    # chromedriver install/version-matching step is needed here).
    - name: Verify Chrome is available
      run: google-chrome-stable --version || google-chrome --version

    - name: Run the cold-menu browser smoke
      # No worktree bootstrap runs in CI, so the `cargo xtask` alias (a
      # gitignored, bootstrap-generated `.cargo/config.toml` entry -- see
      # xtask/README.md's "known limitation") does not exist here; invoke
      # the crate directly instead, matching assets.yml. `--strict-visual`
      # is opt-in via this workflow's manual `workflow_dispatch` input
      # only -- push/pull_request runs never pass it, keeping the default
      # non-fatal baseline-diff policy for ordinary CI (see
      # xtask/README.md's "Visual-diff review gating" section).
      run: >-
        cargo run --locked --package xtask -- web-smoke --scenario cold-menu
        ${{ github.event_name == 'workflow_dispatch' && inputs.strict_visual && '--strict-visual' || '' }}

    # Two artifact uploads instead of one "always" upload: a passing run
    # only needs the screenshots (for visual spot-checking), while a
    # failing run needs the full per-checkpoint diagnostics -- console/
    # network/viewport/server logs and, when a checkpoint failed under
    # `--strict-visual`, its actual/expected/diff baseline triplet (#198;
    # see `xtask/src/web_smoke/baseline.rs`'s `write_diff_triplet`).
    - name: Upload screenshots (success)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-cold-menu-screenshots
        path: target/xtask-artifacts/web-smoke/**/screenshot.png
        if-no-files-found: warn
        retention-days: 14

    - name: Upload full diagnostics (failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-cold-menu-diagnostics
        path: target/xtask-artifacts/web-smoke/
        if-no-files-found: ignore
        retention-days: 14

  gold-journey:
    name: gold-journey (30-checkpoint desktop/phone x DPR 1/2/3 matrix)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Verify Chrome is available
      run: google-chrome-stable --version || google-chrome --version

    - name: Run the gold-journey browser smoke (full DPR matrix)
      # Same alias-independent invocation as the cold-menu job above (no
      # worktree bootstrap runs in CI). Builds its own review-feature wasm
      # bundle into dist-gold-journey/ once -- never dist/ (see
      # xtask/src/web_smoke/gold_journey.rs) -- then reuses that single
      # build across all 6 viewport x DPR entries (30 checkpoints); only
      # the headless-Chrome device-metrics emulation varies per checkpoint.
      run: >-
        cargo run --locked --package xtask -- web-smoke --scenario gold-journey
        ${{ github.event_name == 'workflow_dispatch' && inputs.strict_visual && '--strict-visual' || '' }}

    - name: Upload screenshots (success)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-gold-journey-screenshots
        path: target/xtask-artifacts/web-smoke/**/screenshot.png
        if-no-files-found: warn
        retention-days: 14

    - name: Upload full diagnostics (failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-gold-journey-diagnostics
        path: target/xtask-artifacts/web-smoke/
        if-no-files-found: ignore
        retention-days: 14

  accessibility-settings-reload:
    name: accessibility-settings-reload (a11y toggles persist + zoom permitted)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Verify Chrome is available
      run: google-chrome-stable --version || google-chrome --version

    - name: Run the accessibility-settings-reload browser smoke
      # Same alias-independent invocation as the jobs above (no worktree
      # bootstrap runs in CI). Clicks both Romanian accessibility toggles in
      # the real settings UI, reloads, and asserts localStorage persistence
      # plus zoom capability (see
      # xtask/src/web_smoke/accessibility_settings_reload.rs, #191).
      run: cargo run --locked --package xtask -- web-smoke --scenario accessibility-settings-reload

    - name: Upload smoke artifacts (always, for post-mortem on failure)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-accessibility-settings-reload
        path: target/xtask-artifacts/web-smoke/
        if-no-files-found: ignore
        retention-days: 14

  reduced-motion-fight:
    name: reduced-motion-fight (loader CSS + parallax/shake/lunge suppression)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Verify Chrome is available
      run: google-chrome-stable --version || google-chrome --version

    - name: Run the reduced-motion-fight browser smoke
      # Same alias-independent invocation as the jobs above (no worktree
      # bootstrap runs in CI). Seeds the persisted reduced-motion preference
      # into localStorage before the wasm module boots, drives menu ->
      # creation -> fight through the review seam, and asserts (from exact
      # telemetry, not screenshots) that parallax/fighters stay exactly at
      # rest while idle and every sampled in-combat displacement stays under
      # the documented ceiling (see
      # xtask/src/web_smoke/reduced_motion_fight.rs, #200).
      run: cargo run --locked --package xtask -- web-smoke --scenario reduced-motion-fight

    - name: Upload smoke artifacts (always, for post-mortem on failure)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-reduced-motion-fight
        path: target/xtask-artifacts/web-smoke/
        if-no-files-found: ignore
        retention-days: 14

  fight-palette-desktop:
    name: fight-palette-desktop (descriptor-driven action bar fits the stage)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Verify Chrome is available
      run: google-chrome-stable --version || google-chrome --version

    - name: Run the fight-palette-desktop browser smoke
      # Same alias-independent invocation as the jobs above (no worktree
      # bootstrap runs in CI). Drives menu -> creation -> a fresh fight start
      # through the review seam, then asserts (from exact telemetry, not a
      # pixel diff) that the desktop action palette -- now rendered entirely
      # from action descriptors (#189) -- spawns exactly seven buttons and
      # every one of them fits inside the letterboxed stage rect (see
      # xtask/src/web_smoke/fight_palette_desktop.rs).
      run: cargo run --locked --package xtask -- web-smoke --scenario fight-palette-desktop

    - name: Upload smoke artifacts (always, for post-mortem on failure)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-fight-palette-desktop
        path: target/xtask-artifacts/web-smoke/
        if-no-files-found: ignore
        retention-days: 14

  high-contrast:
    name: high-contrast (persisted preference switches the palette, desktop + phone)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Verify Chrome is available
      run: google-chrome-stable --version || google-chrome --version

    - name: Run the high-contrast browser smoke
      # Same alias-independent invocation as the jobs above (no worktree
      # bootstrap runs in CI). Seeds the persisted high-contrast preference
      # into localStorage before the wasm module boots, captures menu +
      # fight at desktop and phone viewports, and asserts (from exact
      # palette telemetry, not a screenshot pixel probe) that the active
      # theme palette actually switched to the high-contrast token set
      # (see xtask/src/web_smoke/high_contrast.rs, #214).
      run: cargo run --locked --package xtask -- web-smoke --scenario high-contrast

    - name: Upload smoke artifacts (always, for post-mortem on failure)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-high-contrast
        path: target/xtask-artifacts/web-smoke/
        if-no-files-found: ignore
        retention-days: 14

  fight-palette-phone:
    name: fight-palette-phone (category disclosure fits a 390x844 stage)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.8

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "sccache"

    - name: Install Trunk
      uses: taiki-e/install-action@v2
      with:
        tool: trunk

    - name: Verify Chrome is available
      run: google-chrome-stable --version || google-chrome --version

    - name: Run the fight-palette-phone browser smoke
      # Same alias-independent invocation as the jobs above. Drives menu ->
      # creation -> a fresh fight start through the review seam at a 390x844
      # phone viewport, then asserts (from exact telemetry, not a pixel
      # diff) the category-disclosure palette (#199): at most four primary
      # category controls, each opening exactly its registered actions,
      # every visible target at least 44x44 CSS px, everything inside the
      # letterboxed stage rect, and no overlap with the fighter status
      # panels -- in the closed state and every open-category state (see
      # xtask/src/web_smoke/fight_palette_phone.rs).
      run: cargo run --locked --package xtask -- web-smoke --scenario fight-palette-phone

    - name: Upload smoke artifacts (always, for post-mortem on failure)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: web-smoke-fight-palette-phone
        path: target/xtask-artifacts/web-smoke/
        if-no-files-found: ignore
        retention-days: 14
