<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Romanian Folk Fight — embroidery-motif shield mark (self-made). -->
  <!-- Palette: deep red #7a1f1f, black #1a1214, cream #e8dcc8, gold #c9a227 -->
  <rect width="64" height="64" rx="12" fill="#1a1214"/>
  <!-- shield -->
  <path d="M32 6 L54 13 V34 C54 47 44 55 32 59 C20 55 10 47 10 34 V13 Z"
        fill="#7a1f1f" stroke="#e8dcc8" stroke-width="3"/>
  <!-- gold embroidery cross-stitch X -->
  <g stroke="#c9a227" stroke-width="4" stroke-linecap="round">
    <line x1="22" y1="20" x2="42" y2="42"/>
    <line x1="42" y1="20" x2="22" y2="42"/>
  </g>
  <!-- cream stitch dots (folk motif) -->
  <g fill="#e8dcc8">
    <circle cx="32" cy="14.5" r="2.2"/>
    <circle cx="17" cy="31" r="2.2"/>
    <circle cx="47" cy="31" r="2.2"/>
    <circle cx="32" cy="49" r="2.2"/>
  </g>
</svg>
