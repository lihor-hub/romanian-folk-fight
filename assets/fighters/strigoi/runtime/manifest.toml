# Manifest sidecar schema v1 -- see xtask/src/assets/schema.rs.
#
# `pivot`/`display` are derived by replaying the deterministic
# `strigoi_part` transform in `src/cutout.rs` against the human base
# rest-pose as of this commit; they are a point-in-time snapshot, not
# re-derived from the live source by `cargo xtask assets check` (see
# xtask/README.md for this known limitation). Strigoi has no `hair.png` --
# `strigoi_asset_path` returns `None` for that part, so there is no record
# for it here. `crop` is "unknown" for the same reason documented in
# `fighters/human/runtime/manifest.toml`.
version = 1

[[record]]
id = "fighters.strigoi.runtime.head"
path = "head.png"
kind = "image"
category = "fighter-runtime-part"
status = "runtime"
provenance = "cropped-from-source-sheet"
source_sheet = "fighters.strigoi.source.strigoi-cutout-parts-v1"
license = "Same as project assets unless superseded"
dimensions = [128, 157]
sampler = "linear"
attachment = "head"
pivot = [0.0, 72.0]
display = [44.84, 51.24]
crop = "unknown"

