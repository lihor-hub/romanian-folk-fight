# Manifest sidecar schema v1 -- see xtask/src/assets/schema.rs.
#
# `attachment`/`pivot`/`display` are point-in-time snapshots of the rest-pose
# values authored in `src/cutout.rs` (`human_parts`) at the time this sidecar
# was written; they are not re-derived from the live source by
# `cargo xtask assets check` (that cross-reference is out of scope for #167;
# see xtask/README.md for this known limitation). `crop` is "unknown"
# because the source-sheet crop rectangle was never recorded anywhere in the
# repo -- these parts were hand-cropped from
# `fighters/human/source/human_cutout_parts_v1.png` in an image editor.
version = 1

[[record]]
id = "fighters.human.runtime.hair"
path = "hair.png"
kind = "image"
category = "fighter-runtime-part"
status = "runtime"
provenance = "cropped-from-source-sheet"
source_sheet = "fighters.human.source.human-cutout-parts-v1"
license = "Same as project assets unless superseded"
dimensions = [74, 92]
sampler = "linear"
attachment = "hair"
pivot = [1.0, 71.0]
display = [32.0, 20.0]
crop = "500,22,74,92"

