# Manifest sidecar schema v1 -- see xtask/src/assets/schema.rs.
#
# `pivot`/`display` are derived by replaying the deterministic
# `human_parts(1.26)` scale-up followed by the `zmeu_part` transform in
# `src/cutout.rs` against the human base rest-pose as of this commit; they
# are a point-in-time snapshot, not re-derived from the live source by
# `cargo xtask assets check` (see xtask/README.md for this known
# limitation). Zmeu has no `hair.png` -- `zmeu_asset_path` returns `None`
# for that part, so there is no record for it here. `crop` is "unknown" for
# the same reason documented in `fighters/human/runtime/manifest.toml`.
version = 1

[[record]]
id = "fighters.zmeu.runtime.head"
path = "head.png"
kind = "image"
category = "fighter-runtime-part"
status = "runtime"
provenance = "cropped-from-source-sheet"
source_sheet = "fighters.zmeu.source.zmeu-cutout-parts-v1"
license = "Same as project assets unless superseded"
dimensions = [98, 122]
sampler = "linear"
attachment = "head"
pivot = [9.04, 93.6]
display = [54.58, 62.45]
crop = "15,3,98,122"

