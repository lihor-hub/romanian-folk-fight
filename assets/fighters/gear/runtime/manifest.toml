# Manifest sidecar schema v1 -- see xtask/src/assets/schema.rs.
#
# `attachment`/`pivot`/`display` are copied from the live
# `ITEM_VISUALS` table in `src/items/visuals.rs` as of this commit (that
# table already stores exactly this data), so unlike the fighter body-part
# sidecars, these are not at risk of drifting out of sync by construction --
# a future value change there still requires a human to update this sidecar
# alongside it, though; `cargo xtask assets check` does not cross-reference
# the two. `crop` is "unknown" for the same reason documented in
# `fighters/human/runtime/manifest.toml`. Two-part attachments (feet) list
# both attachment points comma-separated.
version = 1

[[record]]
id = "fighters.gear.runtime.bata-ciobaneasca"
path = "bata_ciobaneasca.png"
kind = "image"
category = "gear-runtime-part"
status = "runtime"
provenance = "cropped-from-source-sheet"
source_sheet = "fighters.gear.source.starter-gear-cutout-parts-v1"
license = "Same as project assets unless superseded"
dimensions = [56, 489]
sampler = "linear"
attachment = "hand_front"
pivot = [-2.0, 42.0]
display = [18.0, 136.0]
crop = "unknown"

