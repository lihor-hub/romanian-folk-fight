# Manifest sidecar schema v1 -- see xtask/src/assets/schema.rs.
#
# These full-frame sprite sheets are bootstrap placeholder art (see
# docs/art-direction.md); they are recorded `status = "runtime"` because
# src/arena/animation.rs still loads every one of them today, not because
# they are the intended long-term art.
version = 1

[[record]]
id = "sprites.player"
path = "player.png"
kind = "image"
category = "sprite"
status = "runtime"
provenance = "repo-generated"
generator = "scripts/generate-placeholder-sprites.py"
license = "CC0 1.0"
dimensions = [512, 512]
sampler = "linear"

