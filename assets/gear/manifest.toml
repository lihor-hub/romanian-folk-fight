# Manifest sidecar schema v1 -- see xtask/src/assets/schema.rs.
#
# Historical "equipment overlay" placeholder art (issue #72). Twelve of the
# thirteen files here were superseded by the cropped fighter cutout parts
# under `assets/fighters/gear/runtime/` (see that directory's sidecar) and
# are no longer referenced anywhere in src/ -- `status = "legacy"`.
# `buzdugan_cu_trei_peceti.png` has no equivalent there yet, so
# src/items/visuals.rs still loads it -- `status = "runtime"`.
version = 1

[[record]]
id = "gear.buzdugan-cu-trei-peceti"
path = "buzdugan_cu_trei_peceti.png"
kind = "image"
category = "gear-overlay"
status = "runtime"
provenance = "repo-generated"
generator = "scripts/generate-gear-visuals.py"
license = "CC0 1.0"
dimensions = [128, 128]
sampler = "linear"
attachment = "hand_front"
pivot = [8.0, 18.0]
display = [40.0, 88.0]
crop = "unknown"

